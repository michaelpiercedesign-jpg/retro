version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile 
    
    command: /bin/sh -c "while sleep 600; do :; done"
    tty: true

    # Removed manual volume mapping; DevContainers handles this automatically.
    # Removed network_mode; we will rely on Docker's default internal network.
    depends_on:
      - db

  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      - POSTGRES_DB=voxels
      - POSTGRES_HOST_AUTH_METHOD=trust # For easy local dev access
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: