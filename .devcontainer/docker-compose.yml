services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    init: true
    volumes:
      - ..:/workspaces/retro:cached
    working_dir: /workspaces/retro
    environment:
      # Use localhost now!
      DATABASE_URL: postgres://localhost:5432/voxels
    ports:
      - "9000:9000"
      - "9100:9100"
      - "9200:9200"
      - "3780:3780"
      - "5432:5432"